server:
  port: 8084

spring:
  application:
    name: search-service

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: search_service
    password: search_service_pass
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always