server:
  port: 8084

spring:
  application:
    name: search-service

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: search_service
    password: search_service_pass
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info